<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Juicy Beauty</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-image">
            <div class="auth-overlay">
                <h2>Welcome to the <br>Juicy Club</h2>
                <p>Get exclusive access to new collections and 67% discounts.</p>
            </div>
        </div>

        <div class="auth-form">
            <div class="form-header">
                <img src="images/Logo.png" alt="Logo" class="form-logo">
                <h1>Create Account</h1>
            </div>

            <form>
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Your name">
                </div>
                
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="hello@juicybeauty.com">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••">
                </div>

                <button type="submit" class="btn big full-width">SIGN UP</button>
            </form>

            <p class="auth-footer">Already have an account? <a href="#">Login</a></p>
            <a href="index.html" class="back-home">← Back to shop</a>
        </div>
    </div>
</div>

</body>
</html>
